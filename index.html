<!DOCTYPE html>
<html lang="zh-Hant">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>CAMA CAFE 備料練習</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif;background:#fbc400;}
.wrap{display:flex;flex-direction:column;height:100svh;max-width:430px;margin:0 auto;background:#fff;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,.15);}

/* ── HEADER ── */
.hdr{padding:11px 16px 8px;border-bottom:1.5px solid #f0e8d8;flex-shrink:0;background:#fff;}
.drink-name{font-size:22px;font-weight:700;letter-spacing:-0.02em;color:#1a1208;}
.meta{display:flex;gap:7px;margin-top:5px;align-items:center;}
.badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;}
.cold{background:#dbeafe;color:#1d4ed8;}
.hot{background:#fee2e2;color:#dc2626;}
.gray{background:#f5f0e8;color:#5a4a3a;border:1px solid #e0d6c8;}
.ml-auto{margin-left:auto;font-size:13px;font-weight:600;}

/* ── TOP BUTTON PANEL ── */
.top{flex-shrink:0;padding:9px 14px 7px;border-bottom:1.5px solid #f0e8d8;background:#fff;}
.sec{font-size:10px;font-weight:700;color:#b0a090;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:7px;}

.ibtn{padding:10px 4px;background:#f7f2ea;border:1.5px solid #e8dece;border-radius:11px;font-size:14px;font-weight:700;color:#3d2b1a;cursor:pointer;text-align:center;transition:background .1s,transform .08s,border-color .1s;user-select:none;}
.ibtn:active{background:#fbc400;border-color:#e5a800;transform:scale(.95);color:#1a1208;}

.syrup-row{display:flex;gap:6px;margin-bottom:7px;}
.sbtn{flex:1;padding:9px 4px;background:#fff8e1;border:1.5px solid #fbc400;border-radius:11px;font-size:13px;font-weight:700;color:#7a5000;cursor:pointer;text-align:center;transition:background .1s,transform .08s;user-select:none;}
.sbtn:active{background:#fbc400;color:#1a1208;transform:scale(.95);}

.action-row{display:flex;gap:6px;margin-bottom:7px;}
.actn-btn{flex:1;padding:8px 4px;background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:11px;font-size:12px;font-weight:700;color:#0369a1;cursor:pointer;text-align:center;transition:background .1s,transform .08s;user-select:none;line-height:1.2;}
.actn-btn:active{background:#0369a1;color:#fff;transform:scale(.95);}

.morebtn{width:100%;padding:8px;background:transparent;border:1.5px solid #e0d6c8;border-radius:11px;font-size:13px;font-weight:600;color:#7a6a5a;cursor:pointer;transition:background .1s;}
.morebtn:active{background:#f5f0e8;}

/* ── PENDING PANEL ── */
.pend{flex-shrink:0;padding:10px 14px 11px;background:#fffbeb;border-bottom:1.5px solid #fbc400;}
.pend-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.pend-title{font-size:10px;font-weight:700;color:#7a5000;letter-spacing:.08em;text-transform:uppercase;}
.pend-cancel{background:none;border:none;font-size:20px;color:#7a5000;cursor:pointer;padding:0;line-height:1;}
.pills{display:flex;flex-wrap:wrap;gap:6px;}
.pill{padding:7px 14px;background:#fff;border:1.5px solid #fbc400;border-radius:999px;font-size:13px;font-weight:700;color:#7a5000;cursor:pointer;white-space:nowrap;transition:background .1s,transform .08s;user-select:none;}
.pill:active{background:#fbc400;color:#1a1208;transform:scale(.95);}
.pill.type-pill{background:#fbc400;color:#1a1208;border-color:#e5a800;}
.pill.type-pill:active{background:#e5a800;}
.pill.other{background:transparent;border-style:dashed;color:#a07030;}

/* ── STEP LIST ── */
.bot{flex:1;padding:8px 14px;overflow-y:auto;display:flex;flex-direction:column;}
.empty{text-align:center;color:#c0b0a0;font-size:13px;padding:20px 0;}
.srow{display:flex;align-items:center;gap:5px;margin-bottom:5px;background:#f8f4ee;border-radius:11px;padding:6px 8px;}
.snum{font-size:11px;font-weight:700;color:#c0b0a0;min-width:18px;text-align:center;flex-shrink:0;}
.slbl{font-size:13px;font-weight:700;color:#3d2b1a;flex-shrink:0;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cc-wrap{display:flex;align-items:center;gap:3px;flex:1;min-width:0;}
.cc-num{flex:1;min-width:0;border:1.5px solid #e0d6c8;border-radius:7px;padding:4px 7px;font-size:13px;background:#fff;color:#3d2b1a;outline:none;-moz-appearance:textfield;}
.cc-num::-webkit-outer-spin-button,.cc-num::-webkit-inner-spin-button{-webkit-appearance:none;}
.cc-unit{font-size:12px;font-weight:700;color:#7a6a5a;flex-shrink:0;}
.ainp{flex:1;min-width:0;border:1.5px solid #e0d6c8;border-radius:7px;padding:4px 7px;font-size:13px;background:#fff;color:#3d2b1a;outline:none;}
.ainp:focus,.cc-num:focus{border-color:#fbc400;box-shadow:0 0 0 2px rgba(251,196,0,.2);}
.atag{flex:1;font-size:12px;color:#0369a1;font-weight:600;padding-left:4px;}
.delbtn{width:22px;height:22px;border:none;background:none;color:#c0b0a0;cursor:pointer;font-size:18px;padding:0;flex-shrink:0;line-height:1;transition:color .1s;}
.delbtn:active{color:#dc2626;}

/* ── FOOTER ── */
.foot{display:flex;gap:7px;padding:7px 14px 14px;flex-shrink:0;border-top:1.5px solid #f0e8d8;}
.subbtn{flex:1;padding:12px;background:#fbc400;color:#1a1208;border:none;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;transition:background .1s,transform .08s;}
.subbtn:active{background:#e5a800;transform:scale(.98);}
.subbtn:disabled{opacity:.35;cursor:not-allowed;}
.clrbtn{padding:12px 14px;background:transparent;border:1.5px solid #e0d6c8;border-radius:11px;font-size:13px;font-weight:600;color:#7a6a5a;cursor:pointer;transition:background .1s;}
.clrbtn:active{background:#f5f0e8;}

/* ── MORE SHEET ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:20;display:flex;flex-direction:column;justify-content:flex-end;max-width:430px;margin:0 auto;}
.msheet{background:#fff;border-radius:18px 18px 0 0;padding:14px 14px 26px;}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.mtitle{font-size:14px;font-weight:700;}
.mclosebtn{background:none;border:none;font-size:22px;cursor:pointer;color:#7a6a5a;padding:0;line-height:1;}
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
.mitm{padding:10px 4px;background:#f7f2ea;border:1.5px solid #e8dece;border-radius:11px;font-size:12px;font-weight:700;color:#3d2b1a;cursor:pointer;text-align:center;line-height:1.3;transition:background .1s,transform .08s;user-select:none;}
.mitm:active{background:#fbc400;border-color:#e5a800;transform:scale(.95);}
.mitm.act{background:#f0f9ff;color:#0369a1;border-color:#bae6fd;}
.mitm.act:active{background:#0369a1;color:#fff;}

/* ── RESULT ── */
.rwrap{flex:1;padding:10px 14px;overflow-y:auto;}
.rrow{display:flex;gap:7px;padding:8px 10px;margin-bottom:5px;border-radius:11px;}
.rrow.ok{background:#f0fdf4;border:1.5px solid #86efac;}
.rrow.fail{background:#fef2f2;border:1.5px solid #fca5a5;}
.rico{font-size:14px;flex-shrink:0;margin-top:2px;}
.rrow.ok .rico{color:#16a34a;}
.rrow.fail .rico{color:#dc2626;}
.rbody{flex:1;font-size:12px;line-height:1.55;}
.rtit{font-weight:700;}
.rrow.ok .rtit{color:#16a34a;}
.rrow.fail .rtit{color:#dc2626;}
.rcorrect{color:#16a34a;}
.rwrong{color:#dc2626;}
.rhint{color:#7a6a5a;}
.score-ok{color:#16a34a;font-weight:700;}
.score-fail{color:#dc2626;font-weight:700;}

/* ── START ── */
.start{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:28px 24px 32px;flex:1;background:#fff;}
.logo-img{width:120px;height:120px;object-fit:contain;}
.start-title{font-size:13px;font-weight:700;color:#b0a090;letter-spacing:.1em;text-transform:uppercase;text-align:center;}
.start-sub{font-size:13px;color:#7a6a5a;text-align:center;line-height:1.7;}
.start-cnt{font-size:11px;color:#c0b0a0;}
</style>
</head>

const PENDING_CFG={
  milk:{mode:'milk',title:'選擇奶的種類'},
  ice:{mode:'amounts',title:'選擇冰量',amounts:['滿杯','9分滿','8.5分滿','8分滿','7.5分滿','6分滿','100克','120克','150克','200克','220克','300克']},
  sugar:{mode:'amounts',title:'選擇份量（下）',amounts:['0.5下','1下','1.5下','2下','2.5下','3下','4/3下','5下','6.5下']},
  honey:{mode:'amounts',title:'選擇份量（蜂蜜）',amounts:['2下','2.5下','3下','30克','40克']},
  espresso:{mode:'amounts',title:'選擇份量（個）',amounts:['0.5個','1個','1.5個','2個','2.5個']},
  tea:{mode:'type',title:'選擇茶的種類',types:[
    {label:'紅茶液',amtType:'cc'},
    {label:'烏龍茶液',amtType:'cc'},
  ]},
  water:{mode:'type',title:'選擇水的種類',types:[
    {label:'RO水',nextMode:'amounts',amounts:['補滿','60cc','80cc','100cc','150克','200克','300克']},
    {label:'熱水',nextMode:'amounts',amounts:['140cc','150cc','200cc','210cc','220cc','240cc','280cc','300cc','320cc','350cc','360cc','400cc','480cc']},
  ]},
  tea_bag:{mode:'type',title:'選擇茶包種類',types:[
    {label:'花草茶包',nextMode:'amounts',amounts:['1包','2包']},
    {label:'國寶茶包',nextMode:'amounts',amounts:['1包']},
  ]},
};

function getPendingKey(k){
  return {milk:'milk',ice:'ice',water:'water',sugar:'sugar',brown_sugar:'sugar',
    hazelnut:'sugar',vanilla:'sugar',caramel_salt:'sugar',camellia:'sugar',
    honey:'honey',espresso:'espresso',tea:'tea',tea_bag:'tea_bag'}[k]||null;
}
function getAmtType(k){
  if(k==='action') return 'none';
  if(['tea','matcha','lemon','cold_brew','sea_salt','cream_cap','cocoa'].includes(k)) return 'text';
  return 'cc';
}

const MAIN=[
  {key:'tea',label:'茶'},{key:'milk',label:'奶'},{key:'ice',label:'冰塊'},
  {key:'water',label:'水'},{key:'espresso',label:'咖啡底'},{key:'sugar',label:'蔗糖'},
];
const SYRUP=[
  {key:'hazelnut',label:'榛果'},{key:'vanilla',label:'香草'},{key:'caramel_salt',label:'焦糖海鹽'},
];
const ACTIONS_ROW=[
  {label:'以奶管打熱'},{label:'攪拌均勻'},{label:'浸泡3分鐘'},
];
const MORE=[
  {key:'cream_cap',label:'奶蓋'},{key:'sea_salt',label:'海鹽'},{key:'matcha',label:'抹茶液'},
  {key:'cocoa',label:'可可粉'},{key:'honey',label:'蜂蜜'},{key:'tea_bag',label:'茶包'},
  {key:'berry_jam',label:'莓果醬'},{key:'coffee_jelly',label:'咖啡凍'},
  {key:'camellia',label:'山茶花'},{key:'brown_sugar',label:'黑糖'},
  {key:'lemon',label:'檸檬汁'},{key:'cold_brew',label:'冷萃咖啡液'},
  {key:'coffee_bean',label:'咖啡豆'},
];

// ── STATE ──
let S={phase:'start',recipe:null,steps:[],results:[],score:{c:0,t:0},showMore:false,pending:null};

function norm(s){return (s||'').replace(/\s+/g,'').toLowerCase();}
function check(u,c){
  if(c.key==='action') return u.key==='action';
  return u.key===c.key && norm(u.amount)===norm(c.amount);
}
function sizeTag(s){return {中:'M 中',大:'L 大',特大:'XL 特大'}[s]||s;}

// ── MUTATIONS ──
function pickRandom(){
  S.recipe=RECIPES[Math.floor(Math.random()*RECIPES.length)];
  S.steps=[];S.results=[];S.showMore=false;S.pending=null;S.phase='quiz';render();
}

function tapBtn(key,label){
  const pk=getPendingKey(key);
  if(pk){S.pending={pendingKey:pk,baseKey:key,baseLabel:label};S.showMore=false;}
  else pushStep({key,label,amount:'',amtType:getAmtType(key)});
  render();
}

function tapActionRow(lbl){
  pushStep({key:'action',label:lbl,amount:'',amtType:'none'});
  render();
}

function pushStep(step){
  S.steps.push(step);
  const i=S.steps.length-1;
  setTimeout(()=>{const el=document.getElementById('amt_'+i);if(el)el.focus();},80);
}

// Milk type selected
function selectMilk(i){
  const m=MILK_TYPES[i];
  pushStep({key:'milk',label:m.label,amount:'',amtType:m.amtType,ph:m.ph||''});
  S.pending=null;render();
}

// Sub-type selected (for tea / water / tea_bag)
function selectType(typeLabel,nextMode,amounts,amtType){
  if(nextMode==='amounts'){
    S.pending={...S.pending,mode:'amounts',title:'選擇份量',amounts,chosenLabel:typeLabel};
  } else {
    // Direct: push step with cc input
    pushStep({key:S.pending.baseKey,label:typeLabel,amount:'',amtType:amtType||'cc'});
    S.pending=null;
  }
  render();
}

// Amount pill selected
function selectAmt(a){
  const {baseKey,chosenLabel,baseLabel}=S.pending;
  const label=chosenLabel||baseLabel;
  pushStep({key:baseKey,label,amount:a,amtType:'text'});
  S.pending=null;render();
}

function selectCustom(){
  const {baseKey,chosenLabel,baseLabel}=S.pending;
  const amtType=baseKey==='espresso'?'text':'cc';
  pushStep({key:baseKey,label:chosenLabel||baseLabel,amount:'',amtType});
  S.pending=null;render();
}

function cancelPending(){S.pending=null;render();}
function removeStep(i){S.steps.splice(i,1);render();}
function updateAmt(i,v){S.steps[i].amount=v;}
function updateAmtCC(i,v){S.steps[i].amount=v?v+'cc':'';S.steps[i]._n=v;}

function submitAnswer(){
  const res=[];
  const mx=Math.max(S.steps.length,S.recipe.steps.length);
  for(let i=0;i<mx;i++){
    const u=S.steps[i]||null,c=S.recipe.steps[i]||null;
    if(u&&c) res.push({u,c,ok:check(u,c)});
    else if(u) res.push({u,c:null,ok:false,extra:true});
    else res.push({u:null,c,ok:false,missing:true});
  }
  S.results=res;S.score={c:res.filter(r=>r.ok).length,t:S.recipe.steps.length};
  S.phase='result';render();
}

// ── RENDER ──
function renderHeader(right=''){
  const r=S.recipe,tc=r.temp==='冰'?'cold':'hot';
  return `<div class="hdr"><div class="drink-name">${r.name}</div>
    <div class="meta"><span class="badge ${tc}">${r.temp}</span>
    <span class="badge gray">${sizeTag(r.size)}</span>
    <span class="ml-auto">${right}</span></div></div>`;
}

function renderTop(){
  const mains=MAIN.map(b=>`<button class="ibtn" onclick="tapBtn('${b.key}','${b.label}')">${b.label}</button>`).join('');
  const syrups=SYRUP.map(b=>`<button class="sbtn" onclick="tapBtn('${b.key}','${b.label}')">${b.label}</button>`).join('');
  const actions=ACTIONS_ROW.map(a=>`<button class="actn-btn" onclick="tapActionRow(${JSON.stringify(a.label)})">${a.label}</button>`).join('');
  return `<div class="top">
    <div class="sec">食材</div><div class="grid3">${mains}</div>
    <div class="sec">果露</div><div class="syrup-row">${syrups}</div>
    <div class="sec">動作</div><div class="action-row">${actions}</div>
    <button class="morebtn" onclick="toggleMore()">${S.showMore?'收起 ▲':'更多食材 ▼'}</button>
  </div>`;
}

function renderPending(){
  if(!S.pending) return '';
  const p=S.pending;
  const cfg=PENDING_CFG[p.pendingKey]||{};
  const mode=p.mode||cfg.mode;
  const title=p.title||cfg.title;

  if(mode==='milk'){
    const btns=MILK_TYPES.map((m,i)=>`<button class="pill" onclick="selectMilk(${i})">${m.label}</button>`).join('');
    return `<div class="pend"><div class="pend-head"><span class="pend-title">${title}</span><button class="pend-cancel" onclick="cancelPending()">×</button></div><div class="pills">${btns}</div></div>`;
  }
  if(mode==='type'){
    const types=p.types||cfg.types;
    const btns=types.map((t,i)=>`<button class="pill type-pill" onclick="selectType(${JSON.stringify(t.label)},${JSON.stringify(t.nextMode||null)},${JSON.stringify(t.amounts||null)},${JSON.stringify(t.amtType||null)})">${t.label}</button>`).join('');
    return `<div class="pend"><div class="pend-head"><span class="pend-title">${title}</span><button class="pend-cancel" onclick="cancelPending()">×</button></div><div class="pills">${btns}</div></div>`;
  }
  if(mode==='amounts'){
    const amounts=p.amounts||cfg.amounts;
    const pills=amounts.map(a=>`<button class="pill" onclick="selectAmt(${JSON.stringify(a)})">${a}</button>`).join('');
    return `<div class="pend"><div class="pend-head"><span class="pend-title">${title}</span><button class="pend-cancel" onclick="cancelPending()">×</button></div>
      <div class="pills">${pills}<button class="pill other" onclick="selectCustom()">其他…</button></div></div>`;
  }
  return '';
}

function amtField(s,i){
  if(s.amtType==='none') return `<span class="atag">⚡ ${s.label}</span>`;
  if(s.amtType==='cc'){
    return `<div class="cc-wrap"><input id="amt_${i}" type="number" class="cc-num" value="${s._n||''}" placeholder="數量" oninput="updateAmtCC(${i},this.value)" onkeydown="if(event.key==='Enter'){var n=document.getElementById('amt_${i+1}');if(n)n.focus();}"><span class="cc-unit">cc</span></div>`;
  }
  return `<input id="amt_${i}" class="ainp" value="${s.amount||''}" placeholder="${s.ph||'份量'}" oninput="updateAmt(${i},this.value)" onkeydown="if(event.key==='Enter'){var n=document.getElementById('amt_${i+1}');if(n)n.focus();}">`;
}

function renderSteps(){
  if(!S.steps.length) return `<div class="bot"><div class="sec">已加入步驟</div><div class="empty">點選上方食材開始建立步驟</div></div>`;
  const rows=S.steps.map((s,i)=>`<div class="srow">
    <span class="snum">${i+1}</span>
    <span class="slbl" title="${s.label}">${s.label}</span>
    ${amtField(s,i)}
    <button class="delbtn" onclick="removeStep(${i})">×</button>
  </div>`).join('');
  return `<div class="bot"><div class="sec">已加入步驟（${S.steps.length}步）</div>${rows}</div>`;
}

function renderMore(){
  if(!S.showMore) return '';
  const items=MORE.map(b=>`<button class="mitm" onclick="tapBtn('${b.key}',${JSON.stringify(b.label)})">${b.label}</button>`).join('');
  const actionItems=`<button class="mitm act" onclick="tapBtn('action','動作步驟')">＋動作</button>`;
  return `<div class="overlay" onclick="closeMore()"><div class="msheet" onclick="event.stopPropagation()">
    <div class="mhead"><span class="mtitle">更多食材</span><button class="mclosebtn" onclick="closeMore()">×</button></div>
    <div class="mgrid">${items}${actionItems}</div></div></div>`;
}

function renderResult(){
  const rows=S.results.map((r,i)=>{
    if(r.missing) return `<div class="rrow fail"><span class="rico">✗</span><div class="rbody"><div class="rtit">步驟 ${i+1} 遺漏</div><div class="rhint">正確：${r.c.label}${r.c.amount?' '+r.c.amount:''}</div></div></div>`;
    if(r.extra) return `<div class="rrow fail"><span class="rico">✗</span><div class="rbody"><div class="rtit">步驟 ${i+1} 多餘</div><div class="rwrong">你輸入：${r.u.label}${r.u.amount?' '+r.u.amount:''}</div></div></div>`;
    return `<div class="rrow ${r.ok?'ok':'fail'}"><span class="rico">${r.ok?'✓':'✗'}</span><div class="rbody"><div class="rtit">步驟 ${i+1}</div>
      ${r.ok?`<div class="rcorrect">✓ ${r.c.label}${r.c.amount?' '+r.c.amount:''}</div>`
             :`<div class="rwrong">你的：${r.u.label}${r.u.amount?' '+r.u.amount:' （未填）'}</div><div class="rhint">正確：${r.c.label}${r.c.amount?' '+r.c.amount:''}</div>`}
    </div></div>`;
  }).join('');
  const sc=S.score,cls=sc.c===sc.t?'score-ok':'score-fail';
  return renderHeader(`<span class="${cls}">${sc.c}/${sc.t} 步正確</span>`)+
    `<div class="rwrap">${rows}</div>
     <div class="foot"><button class="subbtn" onclick="pickRandom()">下一題</button><button class="clrbtn" onclick="retryQuiz()">重試</button></div>`;
}

function render(){
  const app=document.getElementById('app');
  if(S.phase==='start'){
    app.innerHTML=`<div class="start">
      <img class="logo-img" src="${LOGO}" alt="CAMA CAFE">
      <div class="start-title">備料練習測驗</div>
      <div class="start-sub">按照正確步驟和份量<br>練習所有飲品製作流程</div>
      <button class="subbtn" style="padding:13px 52px;width:auto" onclick="pickRandom()">開始練習</button>
      <div class="start-cnt">共 ${RECIPES.length} 款飲品配方</div>
    </div>`;
    return;
  }
  if(S.phase==='result'){app.innerHTML=renderResult();return;}
  const stepCt=`<span style="font-size:12px;color:#c0b0a0;font-weight:600">${S.steps.length} 步</span>`;
  app.innerHTML=renderHeader(stepCt)+renderTop()+renderPending()+renderSteps()+
    `<div class="foot"><button class="subbtn" ${!S.steps.length?'disabled':''} onclick="submitAnswer()">提交答案</button>
     <button class="clrbtn" onclick="clearSteps()">清除</button></div>`+renderMore();
}

window.tapBtn=(k,l)=>tapBtn(k,l);
window.tapActionRow=tapActionRow;
window.selectMilk=selectMilk;
window.selectType=selectType;
window.selectAmt=selectAmt;
window.selectCustom=selectCustom;
window.cancelPending=cancelPending;
window.removeStep=removeStep;
window.updateAmt=updateAmt;
window.updateAmtCC=updateAmtCC;
window.submitAnswer=submitAnswer;
window.pickRandom=pickRandom;
window.toggleMore=()=>{S.showMore=!S.showMore;S.pending=null;render();};
window.closeMore=()=>{S.showMore=false;render();};
window.clearSteps=()=>{S.steps=[];S.pending=null;render();};
window.retryQuiz=()=>{S.steps=[];S.results=[];S.phase='quiz';render();};

render();
</script>
</body>
</html>
